<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#09090b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Pizarra virtual inteligente con IA para dibujar, tomar notas y colaborar. Funciona offline y se instala como app." />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Pizarra Inteligente" />
    <meta property="og:description" content="Pizarra virtual inteligente con IA para dibujar y tomar notas." />
    <meta property="og:image" content="./icon.svg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Pizarra Inteligente" />
    <meta property="twitter:description" content="Pizarra virtual inteligente con IA para dibujar y tomar notas." />
    <meta property="twitter:image" content="./icon.svg" />

    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <title>Pizarra Inteligente</title>
  </head>
  <body>
    <div id="root">
      <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: #666;">
        Cargando Pizarra...
      </div>
    </div>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var root = document.getElementById('root');
        if (root) {
          root.innerHTML = '<div style="padding: 20px; color: red; font-family: sans-serif;">' +
            '<h3>Error al cargar la pizarra:</h3>' +
            '<p>' + msg + '</p>' +
            '<p>URL: ' + url + '</p>' +
            '<p>Línea: ' + lineNo + '</p>' +
            '</div>';
        }
        return false;
      };
    </script>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
